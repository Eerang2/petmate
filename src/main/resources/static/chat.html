<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Mate - 채팅</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #faf7f2; }
        .chat-layout {
            display: flex;
            max-width: 1100px;
            margin: 0 auto;
            height: calc(100vh - 64px);
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }

        /* ===== 왼쪽 사이드바 ===== */
        .sidebar {
            width: 320px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            color: #999;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-tab.active {
            color: #B8956A;
            border-bottom-color: #B8956A;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #f5f5f5;
        }
        .sidebar-item:hover { background: #f5f5f5; }
        .sidebar-item.active { background: #f5ece0; }
        .sidebar-item img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
            flex-shrink: 0;
        }
        .sidebar-item.active img { border-color: #B8956A; }
        .sidebar-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar-info .name {
            font-weight: 700;
            font-size: 15px;
            color: #333;
        }
        .sidebar-info .preview {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 요청 아이템 */
        .request-actions {
            display: flex;
            gap: 6px;
        }
        .btn-accept {
            padding: 6px 14px;
            background: #B8956A;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-accept:hover { background: #A6845C; }
        .btn-reject {
            padding: 6px 14px;
            background: #e0e0e0;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reject:hover { background: #bbb; }

        /* ===== 오른쪽 채팅 영역 ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-header .name {
            font-weight: 700;
            font-size: 16px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 16px;
            flex-direction: column;
            gap: 12px;
        }
        .chat-empty .icon { font-size: 48px; }

        /* 메시지 버블 */
        .msg {
            display: flex;
            gap: 8px;
            max-width: 70%;
        }
        .msg.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg img.avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .msg .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }
        .msg.other .bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .msg.mine .bubble {
            background: #B8956A;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg .time {
            font-size: 11px;
            color: #bbb;
            align-self: flex-end;
            flex-shrink: 0;
        }

        /* 입력창 */
        .chat-input-area {
            padding: 12px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            display: none;
        }
        .chat-input-area.visible { display: flex; }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #B8956A; }
        .chat-input-area button {
            padding: 12px 24px;
            background: #B8956A;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        .chat-input-area button:hover { background: #A6845C; }

        /* 빈 사이드바 */
        .sidebar-empty {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 240px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <a href="/main.html" class="logo">
            <span>🐾</span> Pet Mate
        </a>
        <nav class="nav">
            <a href="/community.html">커뮤니티</a>
            <a href="/matching.html">매칭 잡기</a>
            <a href="/chat.html" style="color:#B8956A;">채팅</a>
            <a href="/mypage.html">마이페이지</a>
            <a href="#" onclick="logout()" style="color:#e53935;">로그아웃</a>
        </nav>
    </div>
</header>

<div class="chat-layout">
    <!-- 왼쪽 사이드바 -->
    <div class="sidebar">
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" onclick="switchSidebarTab('chat')">채팅</button>
            <button class="sidebar-tab" onclick="switchSidebarTab('request')">요청</button>
        </div>
        <div class="sidebar-list" id="sidebarList">
            <div class="sidebar-empty">대화 상대가 없습니다.</div>
        </div>
    </div>

    <!-- 오른쪽 채팅 영역 -->
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display:none;">
            <img id="chatPartnerImg" src="" alt="">
            <span class="name" id="chatPartnerName">-</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">
                <div class="icon">💬</div>
                <span>대화할 상대를 선택하세요</span>
            </div>
        </div>
        <div class="chat-input-area" id="chatInputArea">
            <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">전송</button>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
    if (!isLoggedIn()) location.href = '/index.html';

    const userKey = getUserKey();
    let currentTab = 'chat';
    let selectedPartnerId = null;
    let pollingInterval = null;

    // 탭 전환
    function switchSidebarTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        if (tab === 'chat') {
            document.querySelector('.sidebar-tab:first-child').classList.add('active');
            loadAcceptedUsers();
        } else {
            document.querySelector('.sidebar-tab:last-child').classList.add('active');
            loadRequests();
        }
    }

    // 수락된 유저 목록 (채팅 탭)
    async function loadAcceptedUsers() {
        const users = await apiCall('/api/match/accepted?userKey=' + userKey);
        const list = document.getElementById('sidebarList');

        if (!users || users.length === 0) {
            list.innerHTML = '<div class="sidebar-empty">아직 매칭된 상대가 없습니다.</div>';
            return;
        }

        list.innerHTML = users.map(u => `
            <div class="sidebar-item ${selectedPartnerId == u.id ? 'active' : ''}"
                 onclick="openChat(${u.id}, '${(u.name || '').replace(/'/g, "\\'")}', '${u.profileImage || ''}')">
                <img src="${u.profileImage || 'https://via.placeholder.com/48?text=No'}" alt="">
                <div class="sidebar-info">
                    <div class="name">${u.name || '-'}</div>
                    <div class="preview">${u.address || ''}</div>
                </div>
            </div>
        `).join('');
    }

    // 요청 목록 (요청 탭)
    async function loadRequests() {
        const requests = await apiCall('/api/match/pending?userKey=' + userKey);
        const list = document.getElementById('sidebarList');

        if (!requests || requests.length === 0) {
            list.innerHTML = '<div class="sidebar-empty">받은 요청이 없습니다.</div>';
            return;
        }

        list.innerHTML = requests.map(r => `
            <div class="sidebar-item">
                <img src="${r.sender.profileImage || 'https://via.placeholder.com/48?text=No'}" alt="">
                <div class="sidebar-info">
                    <div class="name">${r.sender.name || '-'}</div>
                    <div class="preview">${r.sender.address || ''} | ${r.sender.petType || ''}</div>
                </div>
                <div class="request-actions">
                    <button class="btn-accept" onclick="acceptReq(${r.requestId}, event)">수락</button>
                    <button class="btn-reject" onclick="rejectReq(${r.requestId}, event)">거절</button>
                </div>
            </div>
        `).join('');
    }

    // 요청 수락/거절
    async function acceptReq(requestId, event) {
        event.stopPropagation();
        await apiCall('/api/match/accept/' + requestId, { method: 'POST' });
        loadRequests();
    }
    async function rejectReq(requestId, event) {
        event.stopPropagation();
        await apiCall('/api/match/reject/' + requestId, { method: 'POST' });
        loadRequests();
    }

    // 채팅 열기
    function openChat(partnerId, partnerName, partnerImg) {
        selectedPartnerId = partnerId;

        // 헤더 표시
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('chatPartnerName').textContent = partnerName;
        document.getElementById('chatPartnerImg').src = partnerImg || 'https://via.placeholder.com/40?text=No';

        // 입력창 표시
        document.getElementById('chatInputArea').classList.add('visible');

        // 사이드바 active 처리
        document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
        event.currentTarget?.classList?.add('active');

        // 메시지 로드
        loadMessages();

        // 폴링 시작
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(loadMessages, 3000);
    }

    // 메시지 로드
    async function loadMessages() {
        if (!selectedPartnerId) return;
        const messages = await apiCall('/api/chat/conversation?userId1=' + userKey + '&userId2=' + selectedPartnerId);
        const container = document.getElementById('chatMessages');

        if (!messages || messages.length === 0) {
            container.innerHTML = `
                <div class="chat-empty">
                    <div class="icon">👋</div>
                    <span>첫 메시지를 보내보세요!</span>
                </div>`;
            return;
        }

        container.innerHTML = messages.map(m => {
            const isMine = m.senderId == userKey;
            const time = new Date(m.createdAt).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
            return `
                <div class="msg ${isMine ? 'mine' : 'other'}">
                    ${!isMine ? `<img class="avatar" src="${m.senderProfileImage || 'https://via.placeholder.com/32?text=No'}" alt="">` : ''}
                    <div class="bubble">${escapeHtml(m.content)}</div>
                    <span class="time">${time}</span>
                </div>`;
        }).join('');

        container.scrollTop = container.scrollHeight;
    }

    // 메시지 전송
    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const content = input.value.trim();
        if (!content || !selectedPartnerId) return;

        input.value = '';

        await apiCall('/api/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                senderId: parseInt(userKey),
                receiverId: selectedPartnerId,
                content: content
            })
        });

        loadMessages();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 초기 로드
    loadAcceptedUsers();
</script>
</body>
</html>
